name: Security Checks

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 3 * * 1"

jobs:
  dependency-audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.12.0
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0

      - name: Install dependencies
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/iautomate_ci
        run: npm install

      - name: Run npm audit
        run: npm audit --audit-level=high

  codeql-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Security note
        run: |
          echo "Enable GitHub Code Scanning and Secret Scanning in repository settings for continuous free checks where available."
